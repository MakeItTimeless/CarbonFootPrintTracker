<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Tracker — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-900 via-green-800 to-emerald-900 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">

    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="text-5xl mb-2">🌿</div>
        <h1 class="text-2xl font-bold text-green-800">Carbon Footprint Tracker</h1>
        <p class="text-gray-500 text-sm mt-1">Track your impact. Change your future.</p>
    </div>

    <!-- Tabs -->
    <div class="flex mb-6 bg-gray-100 rounded-xl p-1">
        <button onclick="switchTab('login')" id="loginTab"
                class="flex-1 py-2 rounded-lg text-sm font-semibold transition bg-white text-green-700 shadow">
            Login
        </button>
        <button onclick="switchTab('register')" id="registerTab"
                class="flex-1 py-2 rounded-lg text-sm font-semibold transition text-gray-500">
            Register
        </button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
        <div class="space-y-4">
            <input id="loginUsername" type="text" placeholder="Username"
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-400 text-sm"/>
            <input id="loginPassword" type="password" placeholder="Password"
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-400 text-sm"/>
            <button onclick="login()"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition text-sm">
                Login
            </button>
            <p id="loginError" class="text-red-500 text-xs text-center hidden"></p>
        </div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="hidden">
        <div class="space-y-4">
            <input id="regUsername" type="text" placeholder="Username"
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-400 text-sm"/>
            <input id="regEmail" type="email" placeholder="Email"
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-400 text-sm"/>
            <input id="regPassword" type="password" placeholder="Password"
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-400 text-sm"/>
            <button onclick="register()"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition text-sm">
                Create Account
            </button>
            <p id="registerError" class="text-red-500 text-xs text-center hidden"></p>
        </div>
    </div>

</div>

<script>
    const API = 'http://localhost:8080/api/auth';

// Redirect if already logged in (Changed to relative path)
if (localStorage.getItem('token')) {
    window.location.href = './dashboard.html';
}

function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('registerForm').classList.toggle('hidden', isLogin);
    document.getElementById('loginTab').className = isLogin
        ? 'flex-1 py-2 rounded-lg text-sm font-semibold transition bg-white text-green-700 shadow'
        : 'flex-1 py-2 rounded-lg text-sm font-semibold transition text-gray-500';
    document.getElementById('registerTab').className = !isLogin
        ? 'flex-1 py-2 rounded-lg text-sm font-semibold transition bg-white text-green-700 shadow'
        : 'flex-1 py-2 rounded-lg text-sm font-semibold transition text-gray-500';
}

async function login() {
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');

    try {
        const res = await fetch(`${API}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (!res.ok) throw new Error('Invalid credentials');

        const data = await res.json();
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);

        // Success! Redirect to dashboard relatively
        window.location.href = './dashboard.html';

    } catch (e) {
        errorEl.textContent = e.message;
        errorEl.classList.remove('hidden');
    }
}

async function register() {
    const username = document.getElementById('regUsername').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const errorEl = document.getElementById('registerError');

    try {
        const res = await fetch(`${API}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });

        if (!res.ok) throw new Error('Registration failed');

        const data = await res.json();
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);

        // Success! Redirect to dashboard relatively
        window.location.href = './dashboard.html';

    } catch (e) {
        errorEl.textContent = e.message;
        errorEl.classList.remove('hidden');
    }
}
</script>

</body>
</html>
