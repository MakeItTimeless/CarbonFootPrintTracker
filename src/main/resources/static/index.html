<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Footprint Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

<h1 class="text-3xl font-bold text-green-700 mb-8 text-center">🌿 Carbon Footprint Tracker</h1>

<div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">

    <!-- LEFT: Form -->
    <div class="bg-white rounded-2xl shadow p-6">
        <h2 class="text-xl font-semibold text-gray-700 mb-4">Log New Activity</h2>

        <div class="space-y-3">
            <input id="activityName" type="text" placeholder="Activity Name (e.g. Daily Commute)"
                   class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"/>

            <select id="category" class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-400">
                <option value="">Select Category</option>
                <option value="Transport">Transport</option>
                <option value="Electricity">Electricity</option>
                <option value="Food">Food</option>
                <option value="Shopping">Shopping</option>
                <option value="Heating">Heating</option>
            </select>

            <input id="quantity" type="number" placeholder="Quantity (e.g. 150)"
                   class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"/>

            <input id="unit" type="text" placeholder="Unit (e.g. km, kWh, kg)"
                   class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"/>

            <input id="carbonKg" type="number" step="0.01" placeholder="Carbon (kg CO2)"
                   class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"/>

            <input id="activityDate" type="date"
                   class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"/>

            <button onclick="submitRecord()"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition">
                🌱 Track Footprint
            </button>

            <p id="loadingMsg" class="text-center text-sm text-gray-400 hidden">Analyzing with AI...</p>
        </div>
    </div>

    <!-- RIGHT: Records List -->
    <div class="bg-white rounded-2xl shadow p-6">
        <h2 class="text-xl font-semibold text-gray-700 mb-4">Activity Log</h2>
        <div id="recordsList" class="space-y-4 overflow-y-auto max-h-[600px]">
            <p class="text-gray-400 text-sm">No records yet. Add one!</p>
        </div>
    </div>

</div>

<script>
    const API = 'http://localhost:8080/api/records';

    async function loadRecords() {
        const res = await fetch(API);
        const records = await res.json();
        const container = document.getElementById('recordsList');

        if (records.length === 0) {
            container.innerHTML = '<p class="text-gray-400 text-sm">No records yet. Add one!</p>';
            return;
        }

        container.innerHTML = records.reverse().map(r => `
            <div class="border rounded-xl p-4 bg-green-50">
                <div class="flex justify-between items-center mb-1">
                    <span class="font-semibold text-green-800">${r.activityName}</span>
                    <span class="text-xs bg-green-200 text-green-700 px-2 py-0.5 rounded-full">${r.category}</span>
                </div>
                <p class="text-sm text-gray-600">${r.quantity} ${r.unit} • ${r.carbonKg ?? '-'} kg CO₂ • ${r.activityDate}</p>
                <p class="text-sm text-gray-500 mt-2 italic">🤖 ${r.aiDescription}</p>
            </div>
        `).join('');
    }

    async function submitRecord() {
        const activityName = document.getElementById('activityName').value;
        const category = document.getElementById('category').value;
        const quantity = document.getElementById('quantity').value;
        const unit = document.getElementById('unit').value;
        const carbonKg = document.getElementById('carbonKg').value;
        const activityDate = document.getElementById('activityDate').value;

        if (!activityName || !category || !quantity || !unit || !activityDate) {
            alert('Please fill in all required fields.');
            return;
        }

        document.getElementById('loadingMsg').classList.remove('hidden');

        const payload = {
            activityName,
            category,
            quantity: parseFloat(quantity),
            unit,
            carbonKg: carbonKg ? parseFloat(carbonKg) : null,
            activityDate,
            status: 'ACTIVE'
        };

        await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        document.getElementById('loadingMsg').classList.add('hidden');
        document.getElementById('activityName').value = '';
        document.getElementById('quantity').value = '';
        document.getElementById('unit').value = '';
        document.getElementById('carbonKg').value = '';

        await loadRecords();
    }

    loadRecords();
</script>

</body>
</html>
